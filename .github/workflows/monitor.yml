name: Monitorar passagens

on:
  # Sem "schedule:" de proposito -- o agendador nativo do GitHub Actions
  # provou ser pouco confiavel (nao disparava, e quando passou a disparar
  # foi com ~2h de atraso, duplicando execucoes junto com o cron externo).
  # O disparo real e feito por um cron externo (cron-job.org, ver README
  # Passo 7) chamando este workflow_dispatch: 2x/dia em modo completo, e
  # opcionalmente mais vezes ao dia em modo rapido (Passo 8).
  workflow_dispatch:
    inputs:
      modo:
        description: "completo (2x/dia, detalhe+resumo) ou rapido (checagem leve, so alerta)"
        type: choice
        options:
          - completo
          - rapido
        default: completo

permissions:
  contents: write

jobs:
  buscar-passagens:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar o monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODO_EXECUCAO: ${{ inputs.modo }}
        run: python -m bot_passagens.main

      - name: Salvar historico de precos e dashboard no repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historico.db docs/index.html
          if git diff --cached --quiet; then
            echo "Sem mudancas no historico ou no dashboard."
          else
            git commit -m "Atualiza historico de precos e dashboard"
            git push
          fi
