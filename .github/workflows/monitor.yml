name: Monitorar passagens

on:
  schedule:
    # Horarios em UTC. Cuiaba (UTC-4) = ~8h e ~20h.
    # Reduzido de 5x para 2x/dia para diminuir o risco de rate limit no Google Voos.
    # Minuto 5 (nao 0) de proposito: o GitHub atrasa/pula com mais frequencia
    # execucoes agendadas bem na hora cheia, por ser o horario de pico.
    - cron: "5 12 * * *"
    - cron: "5 0 * * *"
  workflow_dispatch: {}

jobs:
  buscar-passagens:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar o monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m bot_passagens.main
