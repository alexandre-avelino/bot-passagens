origem: CGB
destinos:
  - GRU
  - CGH
  # - VCP  # avaliar incluir; Azul costuma ter bons preços CGB-VCP

periodo:
  inicio: 2026-09-29
  fim: 2026-10-13

dias_obrigatorios:
  - 2026-10-06
margem_adjacente: 1   # dia obrigatorio nunca pode ser dia de ida/volta; exige pelo menos 1 dia de folga antes E depois dele

duracao:
  minima: 4
  maxima: 7

passageiros: 1

alertas:
  preco_maximo: 500        # em R$, ida + volta -- dispara alerta imediato quando achar preco <= esse valor
  queda_percentual: 10
  novo_menor_preco: true

resumo_diario: "08:00"     # horario de Cuiaba (informativo; quem controla o horario real e o cron do workflow)
